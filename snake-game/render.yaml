# Render 部署配置
# 免费部署贪吃蛇游戏服务器 + PostgreSQL 数据库

services:
  # Web 服务
  - type: web
    name: snake-game-server
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: snake-game-db
          property: connectionString
    autoDeploy: true
    # 免费计划：每月 750 小时运行时间

# PostgreSQL 数据库
databases:
  - name: snake-game-db
    databaseName: snake_game
    user: snake_user
    plan: free
    # 免费计划：256 MB 存储
    # 支持最多 10 个连接
