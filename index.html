<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='32' y='45' font-size='40' text-anchor='middle'%3E🐍%3C/text%3E%3C/svg%3E">
    <title>贪吃蛇 - 联网版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
            padding: 10px 0;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 5px;
            width: 100%;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            color: #eee;
            font-size: 16px;
            font-weight: bold;
            padding: 0 10px;
        }
        
        .score-box {
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }
        
        .high-score {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
        }
        
        .speed-info {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        
        canvas {
            border: 3px solid #0f3460;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow: 0 0 30px rgba(15, 52, 96, 0.5);
            max-width: 95vw;
            max-height: 55vh;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }
        
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 4px;
        }
        
        .btn {
            background: linear-gradient(145deg, #0f3460, #0a2540);
            border: none;
            border-radius: 12px;
            color: #eee;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:active {
            transform: scale(0.95);
            background: linear-gradient(145deg, #e94560, #c73e54);
        }
        
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        .btn-center { grid-column: 2; grid-row: 2; opacity: 0; }
        
        .action-btns {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        
        .action-btn {
            padding: 10px 25px;
            background: linear-gradient(145deg, #e94560, #c73e54);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: all 0.2s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-btn.secondary {
            background: linear-gradient(145deg, #0f3460, #0a2540);
            box-shadow: 0 4px 15px rgba(15, 52, 96, 0.4);
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            overflow-y: auto;
            padding: 20px;
        }
        
        .overlay h1 {
            font-size: 36px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px #e94560;
        }
        
        .overlay h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .overlay p {
            font-size: 16px;
            margin-bottom: 15px;
            color: #aaa;
        }
        
        .hidden {
            display: none !important;
        }
        
        .name-input {
            padding: 12px 20px;
            font-size: 18px;
            border: 2px solid #0f3460;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            margin-bottom: 20px;
            width: 250px;
            outline: none;
        }
        
        .name-input::placeholder {
            color: #888;
        }
        
        .name-input:focus {
            border-color: #e94560;
            background: rgba(255,255,255,0.15);
        }
        
        .leaderboard {
            width: 100%;
            max-width: 400px;
            max-height: 40vh;
            overflow-y: auto;
            margin: 15px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 10px;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 16px;
        }
        
        .leaderboard-item.rank-1 {
            background: linear-gradient(90deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1));
            border: 1px solid rgba(255,215,0,0.5);
        }
        
        .leaderboard-item.rank-2 {
            background: linear-gradient(90deg, rgba(192,192,192,0.3), rgba(192,192,192,0.1));
            border: 1px solid rgba(192,192,192,0.5);
        }
        
        .leaderboard-item.rank-3 {
            background: linear-gradient(90deg, rgba(205,127,50,0.3), rgba(205,127,50,0.1));
            border: 1px solid rgba(205,127,50,0.5);
        }
        
        .rank-num {
            font-weight: bold;
            font-size: 18px;
            width: 30px;
        }
        
        .rank-1 .rank-num { color: #ffd700; }
        .rank-2 .rank-num { color: #c0c0c0; }
        .rank-3 .rank-num { color: #cd7f32; }
        
        .player-name {
            flex: 1;
            text-align: left;
            padding-left: 10px;
        }
        
        .player-score {
            font-weight: bold;
            color: #4ade80;
        }
        
        .final-score-display {
            font-size: 48px;
            color: #ffd700;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        
        .install-tip {
            position: fixed;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            color: #aaa;
        }
        
        .current-player {
            color: #4ade80;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .loading {
            color: #4ade80;
            font-size: 14px;
            margin: 10px 0;
        }
        
        .error-msg {
            color: #e94560;
            font-size: 14px;
            margin: 10px 0;
        }
        
        .online-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }
        
        .online-indicator.offline {
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .server-info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="online-indicator" id="onlineIndicator"></div>
    
    <div class="game-container">
        <div class="current-player" id="currentPlayer"></div>
        <div class="header">
            <div class="score-box">得分: <span id="score">0</span></div>
            <div class="score-box speed-info">速度: <span id="speedLevel">1</span>x</div>
            <div class="score-box high-score">🏆 <span id="highScore">联网版</span></div>
        </div>
        
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        
        <div class="controls">
            <div class="d-pad">
                <button class="btn btn-up" data-dir="up">▲</button>
                <button class="btn btn-left" data-dir="left">◀</button>
                <button class="btn btn-center"></button>
                <button class="btn btn-right" data-dir="right">▶</button>
                <button class="btn btn-down" data-dir="down">▼</button>
            </div>
            
            <div class="action-btns">
                <button class="action-btn" id="startBtn">开始</button>
                <button class="action-btn secondary" id="pauseBtn">暂停</button>
            </div>
        </div>
    </div>
    
    <!-- 输入名字界面 -->
    <div class="overlay" id="nameScreen">
        <h1>🐍 贪吃蛇</h1>
        <p>输入你的名字开始游戏</p>
        <input type="text" class="name-input" id="playerNameInput" placeholder="你的名字" maxlength="12">
        <div class="loading hidden" id="loadingText">正在连接服务器...</div>
        <div class="error-msg hidden" id="errorText"></div>
        
        <button class="action-btn" id="confirmNameBtn">开始游戏</button>
        
        <h2 style="margin-top: 30px;">🏆 全球排行榜</h2>
        <div class="leaderboard" id="mainLeaderboard">
            <p style="text-align: center; color: #666;">加载中...</p>
        </div>
        
        <div class="server-info" id="serverInfo"></div>
    </div>
    
    <!-- 游戏结束界面 -->
    <div class="overlay hidden" id="gameOver">
        <h1>游戏结束</h1>
        <div class="final-score-display" id="finalScore">0</div>
        <p id="rankDisplay"></p>
        
        <div class="loading hidden" id="savingText">正在保存分数...</div>
        
        <h2>🏆 全球排行榜</h2>
        <div class="leaderboard" id="gameOverLeaderboard"></div>
        
        <div class="action-btns" style="margin-top: 20px;">
            <button class="action-btn" id="restartBtn">再来一局</button>
            <button class="action-btn secondary" id="changeNameBtn">换个名字</button>
        </div>
    </div>
    
    <div class="install-tip">提示：可将此页面添加到主屏幕</div>

    <script>
        // API 基础路径（相对路径，自动适配当前域名）
        const API_BASE = '';
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const speedLevelEl = document.getElementById('speedLevel');
        const finalScoreEl = document.getElementById('finalScore');
        const rankDisplayEl = document.getElementById('rankDisplay');
        const gameOverEl = document.getElementById('gameOver');
        const nameScreenEl = document.getElementById('nameScreen');
        const playerNameInput = document.getElementById('playerNameInput');
        const currentPlayerEl = document.getElementById('currentPlayer');
        const mainLeaderboardEl = document.getElementById('mainLeaderboard');
        const gameOverLeaderboardEl = document.getElementById('gameOverLeaderboard');
        const loadingText = document.getElementById('loadingText');
        const errorText = document.getElementById('errorText');
        const savingText = document.getElementById('savingText');
        const onlineIndicator = document.getElementById('onlineIndicator');
        const serverInfo = document.getElementById('serverInfo');
        
        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        const BASE_SPEED = 200;
        const SPEED_INCREMENT = 15;
        const MIN_SPEED = 60;
        
        // 跑马灯动画
        let rainbowOffset = 0;
        
        let snake = [{x: 12, y: 12}];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let currentSpeed = BASE_SPEED;
        let speedLevel = 1;
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;
        let playerName = '';
        let leaderboard = [];
        let isOnline = true;
        
        // 检查网络状态
        function updateOnlineStatus() {
            isOnline = navigator.onLine;
            onlineIndicator.classList.toggle('offline', !isOnline);
        }
        
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();
        
        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/api/leaderboard`);
                if (!response.ok) throw new Error('服务器错误');
                
                leaderboard = await response.json();
                renderLeaderboard(mainLeaderboardEl);
                renderLeaderboard(gameOverLeaderboardEl);
                
                // 显示服务器信息
                const hostname = window.location.hostname;
                const port = window.location.port;
                serverInfo.textContent = `服务器: ${hostname}${port ? ':' + port : ''} | 在线`;
                onlineIndicator.classList.remove('offline');
                
            } catch (error) {
                console.error('加载排行榜失败:', error);
                mainLeaderboardEl.innerHTML = `
                    <p style="text-align: center; color: #e94560;">
                        ⚠️ 无法连接服务器<br>
                        <span style="font-size: 12px;">请检查网络或稍后再试</span>
                    </p>
                `;
                onlineIndicator.classList.add('offline');
                serverInfo.textContent = '离线模式';
            }
        }
        
        // 渲染排行榜
        function renderLeaderboard(container, highlightScore = null) {
            if (leaderboard.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">暂无记录</p>';
                return;
            }
            
            const top10 = leaderboard.slice(0, 10);
            
            container.innerHTML = top10.map((entry, index) => {
                const rankClass = index < 3 ? `rank-${index + 1}` : '';
                const isHighlight = highlightScore && entry.score === highlightScore && entry.name === playerName;
                const highlightStyle = isHighlight ? 'box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);' : '';
                
                // 格式化日期
                const date = new Date(entry.date);
                const dateStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                
                return `
                    <div class="leaderboard-item ${rankClass}" style="${highlightStyle}">
                        <span class="rank-num">${index + 1}</span>
                        <span class="player-name">${escapeHtml(entry.name)}</span>
                        <span class="player-score">${entry.score}</span>
                    </div>
                `;
            }).join('');
        }
        
        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 提交分数
        async function submitScore(score) {
            savingText.classList.remove('hidden');
            rankDisplayEl.textContent = '正在提交分数...';
            
            try {
                console.log('提交分数:', { name: playerName, score });
                
                const response = await fetch(`${API_BASE}/api/score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: playerName, score: score })
                });
                
                console.log('服务器响应:', response.status);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: '未知错误' }));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                
                const result = await response.json();
                console.log('提交成功:', result);
                
                // 重新加载排行榜
                await loadLeaderboard();
                
                // 显示排名
                if (result.rank <= 10) {
                    rankDisplayEl.innerHTML = `🎉 恭喜！你排名第 <span style="color: #ffd700; font-size: 24px;">${result.rank}</span> 位！`;
                } else {
                    rankDisplayEl.textContent = `你的排名：第 ${result.rank} 位`;
                }
                
                // 渲染排行榜并高亮
                renderLeaderboard(gameOverLeaderboardEl, score);
                
            } catch (error) {
                console.error('提交分数失败:', error);
                rankDisplayEl.innerHTML = `<span style="color: #e94560;">⚠️ 分数保存失败: ${error.message}<br/>
                    <span style="font-size: 12px;">请检查网络连接</span>
                </span>`;
            } finally {
                savingText.classList.add('hidden');
            }
        }
        
        // 更新速度
        function updateSpeed() {
            const newSpeedLevel = Math.floor(score / 100) + 1;
            if (newSpeedLevel !== speedLevel) {
                speedLevel = newSpeedLevel;
                currentSpeed = Math.max(MIN_SPEED, BASE_SPEED - (speedLevel - 1) * SPEED_INCREMENT);
                speedLevelEl.textContent = speedLevel;
                
                if (gameLoop) {
                    clearInterval(gameLoop);
                    gameLoop = setInterval(() => {
                        update();
                        draw();
                    }, currentSpeed);
                }
            }
        }
        
        // 生成食物
        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    break;
                }
            }
        }
        
        // 绘制游戏
        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 更新跑马灯偏移
            rainbowOffset += 0.1;
            
            // 绘制蛇 - 彩虹跑马灯效果
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                
                // 计算彩虹色 - 基于索引和时间的流动效果
                const hue = ((index * 15) + rainbowOffset * 2) % 360;
                const color = `hsl(${hue}, 100%, 50%)`;
                const glowColor = `hsl(${hue}, 100%, 70%)`;
                
                // 蛇身发光效果
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = index === 0 ? 15 : 8;
                
                // 蛇头特殊处理
                if (index === 0) {
                    // 蛇头 - 更亮更大
                    ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                    ctx.fillRect(x + 1, y + 1, gridSize - 2, gridSize - 2);
                    
                    // 蛇头边框
                    ctx.strokeStyle = `hsl(${hue}, 100%, 80%)`;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 1, y + 1, gridSize - 2, gridSize - 2);
                    
                    // 蛇头眼睛
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    // 根据方向调整眼睛位置
                    let eyeOffsetX = 0, eyeOffsetY = 0;
                    if (dx === 1) eyeOffsetX = 2;
                    if (dx === -1) eyeOffsetX = -2;
                    if (dy === 1) eyeOffsetY = 2;
                    if (dy === -1) eyeOffsetY = -2;
                    
                    ctx.fillRect(x + 4 + eyeOffsetX, y + 5 + eyeOffsetY, 4, 4);
                    ctx.fillRect(x + 12 + eyeOffsetX, y + 5 + eyeOffsetY, 4, 4);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x + 5 + eyeOffsetX, y + 6 + eyeOffsetY, 2, 2);
                    ctx.fillRect(x + 13 + eyeOffsetX, y + 6 + eyeOffsetY, 2, 2);
                } else {
                    // 蛇身 - 彩虹渐变
                    const alpha = 0.8 - (index / snake.length) * 0.3;
                    ctx.fillStyle = `hsla(${hue}, 90%, 45%, ${alpha})`;
                    ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
                    
                    // 内部高光
                    ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${alpha * 0.5})`;
                    ctx.fillRect(x + 4, y + 4, gridSize - 8, gridSize - 8);
                }
                
                // 重置阴影
                ctx.shadowBlur = 0;
            });
            
            const fx = food.x * gridSize;
            const fy = food.y * gridSize;
            
            const glow = ctx.createRadialGradient(
                fx + gridSize/2, fy + gridSize/2, 0,
                fx + gridSize/2, fy + gridSize/2, gridSize
            );
            glow.addColorStop(0, 'rgba(239, 68, 68, 0.3)');
            glow.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(fx - 5, fy - 5, gridSize + 10, gridSize + 10);
            
            const fGradient = ctx.createRadialGradient(
                fx + 5, fy + 5, 0,
                fx + gridSize/2, fy + gridSize/2, gridSize/2
            );
            fGradient.addColorStop(0, '#f87171');
            fGradient.addColorStop(1, '#dc2626');
            ctx.fillStyle = fGradient;
            ctx.beginPath();
            ctx.arc(fx + gridSize/2, fy + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.ellipse(fx + gridSize/2 + 2, fy + 3, 4, 2, Math.PI/4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 更新游戏状态
        function update() {
            if (!gameRunning || gamePaused) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                generateFood();
                updateSpeed();
            } else {
                snake.pop();
            }
        }
        
        // 游戏结束
        async function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            finalScoreEl.textContent = score;
            rankDisplayEl.textContent = '正在提交分数...';
            gameOverEl.classList.remove('hidden');
            
            // 提交分数到服务器
            await submitScore(score);
        }
        
        // 开始游戏
        function startGame() {
            snake = [{x: 12, y: 12}];
            dx = 1;
            dy = 0;
            score = 0;
            rainbowOffset = 0;
            currentSpeed = BASE_SPEED;
            speedLevel = 1;
            
            scoreEl.textContent = score;
            speedLevelEl.textContent = speedLevel;
            
            generateFood();
            gameRunning = true;
            gamePaused = false;
            gameOverEl.classList.add('hidden');
            nameScreenEl.classList.add('hidden');
            document.getElementById('startBtn').textContent = '重置';
            document.getElementById('pauseBtn').textContent = '暂停';
            currentPlayerEl.textContent = `玩家: ${playerName}`;
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                update();
                draw();
            }, currentSpeed);
        }
        
        // 暂停/继续
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').textContent = gamePaused ? '继续' : '暂停';
        }
        
        // 方向控制
        function setDirection(direction) {
            if (!gameRunning || gamePaused) return;
            
            switch(direction) {
                case 'up':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault();
                    setDirection('up');
                    break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault();
                    setDirection('down');
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault();
                    setDirection('left');
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    e.preventDefault();
                    setDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });
        
        // 触摸按钮控制
        document.querySelectorAll('.btn[data-dir]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                setDirection(btn.dataset.dir);
            });
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                setDirection(btn.dataset.dir);
            });
        });
        
        // 滑动控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning || gamePaused) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                setDirection(dx > 0 ? 'right' : 'left');
            } else {
                setDirection(dy > 0 ? 'down' : 'up');
            }
        }, {passive: false});
        
        // 按钮事件
        document.getElementById('startBtn').addEventListener('click', () => {
            if (gameRunning) {
                startGame();
            } else {
                nameScreenEl.classList.remove('hidden');
                loadLeaderboard();
            }
        });
        
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        document.getElementById('changeNameBtn').addEventListener('click', () => {
            gameOverEl.classList.add('hidden');
            nameScreenEl.classList.remove('hidden');
            playerNameInput.value = playerName;
            playerNameInput.focus();
            loadLeaderboard();
        });
        
        // 确认名字并开始游戏
        function confirmName() {
            const name = playerNameInput.value.trim();
            if (name.length < 1) {
                playerNameInput.style.borderColor = '#e94560';
                setTimeout(() => {
                    playerNameInput.style.borderColor = '#0f3460';
                }, 500);
                return;
            }
            playerName = name;
            startGame();
        }
        
        document.getElementById('confirmNameBtn').addEventListener('click', confirmName);
        
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmName();
            }
        });
        
        // 初始化
        generateFood();
        draw();
        loadLeaderboard();
        playerNameInput.focus();
        
        // 跑马灯动画循环 - 独立于游戏循环
        function animateRainbow() {
            if (gameRunning && !gamePaused) {
                rainbowOffset += 2;
                draw();
            }
            requestAnimationFrame(animateRainbow);
        }
        animateRainbow();
        
        // 定时刷新排行榜（每30秒）
        setInterval(() => {
            if (!gameRunning && nameScreenEl.classList.contains('hidden') === false) {
                loadLeaderboard();
            }
        }, 30000);
    </script>
</body>
</html>
